sources:
  lapd_2024:
    file: data/raw/crime/lapd_crime_2024.csv
    download:
      type: socrata_csv
      endpoint: https://data.lacity.org/resource/2nrs-mtv8
      limit: 500000
      select:
        - dr_no
        - date_occ
        - time_occ
        - crm_cd
        - crm_cd_desc
        - location
        - lat
        - lon
        - area
        - area_name
        - premis_desc
        - weapon_desc
        - status_desc
      where: date_occ between '2024-01-01T00:00:00' and '2024-12-31T23:59:59'
    source_type: local_incident
    source_url: https://data.lacity.org/resource/2nrs-mtv8
    source_year: 2024
    coverage_level: jurisdiction
    coverage_area_name: City of Los Angeles
    data_start_date: 2024-01-01
    data_end_date: 2024-12-31
    update_cadence: historical_snapshot
    coordinate_quality: approximate_block_or_reported_point
    offense_mapping_quality: configured_keyword_mapping
    coverage_notes: LAPD public crime data with coordinates; address fields are privacy-generalized by the source.
    jurisdiction_name: Los Angeles
    jurisdiction_state: CA
    date_column: date_occ
    time_column: time_occ
    offense_column: crm_cd_desc
    offense_code_column: crm_cd
    latitude_column: lat
    longitude_column: lon
    address_column: location
    zip_column: null
    incident_id_column: dr_no
    source_crs: EPSG:4326
    timezone: America/Los_Angeles

  chicago_2024:
    file: data/raw/crime/chicago_crime_2024.csv
    download:
      type: socrata_csv
      endpoint: https://data.cityofchicago.org/resource/ijzp-q8t2
      limit: 500000
      select:
        - id
        - case_number
        - date
        - primary_type
        - description
        - block
        - latitude
        - longitude
        - location_description
        - arrest
        - domestic
        - year
      where: date between '2024-01-01T00:00:00' and '2024-12-31T23:59:59'
    source_type: local_incident
    source_url: https://data.cityofchicago.org/resource/ijzp-q8t2
    source_year: 2024
    coverage_level: jurisdiction
    coverage_area_name: City of Chicago
    coverage_state: IL
    data_start_date: 2024-01-01
    data_end_date: 2024-12-31
    update_cadence: historical_snapshot
    coordinate_quality: approximate_block_or_reported_point
    offense_mapping_quality: configured_keyword_mapping
    coverage_notes: Chicago public crime data with latitude and longitude when available; incident locations may be generalized by the source.
    jurisdiction_name: Chicago
    jurisdiction_state: IL
    date_column: date
    time_column: null
    offense_column: primary_type
    offense_code_column: iucr
    latitude_column: latitude
    longitude_column: longitude
    address_column: block
    zip_column: null
    incident_id_column: id
    source_crs: EPSG:4326
    timezone: America/Chicago

  sfpd_2024:
    file: data/raw/crime/sfpd_incidents_2024.csv
    download:
      type: socrata_csv
      endpoint: https://data.sfgov.org/resource/wg3w-h783
      limit: 300000
      select:
        - row_id
        - incident_datetime
        - incident_date
        - incident_time
        - incident_id
        - incident_number
        - incident_code
        - incident_category
        - incident_subcategory
        - incident_description
        - intersection
        - police_district
        - analysis_neighborhood
        - latitude
        - longitude
        - resolution
      where: incident_datetime between '2024-01-01T00:00:00' and '2024-12-31T23:59:59'
    source_type: local_incident
    source_url: https://data.sfgov.org/resource/wg3w-h783
    source_year: 2024
    coverage_level: jurisdiction
    coverage_area_name: City and County of San Francisco
    coverage_state: CA
    data_start_date: 2024-01-01
    data_end_date: 2024-12-31
    update_cadence: historical_snapshot
    coordinate_quality: approximate_intersection_or_reported_point
    offense_mapping_quality: configured_keyword_mapping
    coverage_notes: SFPD incident reports with coordinates; source notes that locations may be mapped to nearby intersections for anonymity.
    jurisdiction_name: San Francisco
    jurisdiction_state: CA
    date_column: incident_datetime
    time_column: null
    offense_column: incident_category
    offense_code_column: incident_code
    latitude_column: latitude
    longitude_column: longitude
    address_column: intersection
    zip_column: null
    incident_id_column: row_id
    source_crs: EPSG:4326
    timezone: America/Los_Angeles

  dallas_2024:
    file: data/raw/crime/dallas_incidents_2024.csv
    download:
      type: socrata_csv
      endpoint: https://www.dallasopendata.com/resource/yn72-daik
      limit: 300000
      select:
        - incidentnum
        - servnumid
        - year1
        - month1
        - date1dayofyear
        - time1
        - offincident
        - nibrs_crime
        - nibrs_crime_category
        - nibrs_code
        - incident_address
        - zip_code
        - city
        - state
        - geocoded_column
      where: year1 = 2024
    source_type: local_incident
    source_url: https://www.dallasopendata.com/resource/yn72-daik
    source_year: 2024
    coverage_level: jurisdiction
    coverage_area_name: City of Dallas
    coverage_state: TX
    data_start_date: 2024-01-01
    data_end_date: 2024-12-31
    update_cadence: historical_snapshot
    coordinate_quality: geocoded_point_or_zip
    offense_mapping_quality: configured_keyword_mapping
    coverage_notes: Dallas public RMS incidents include NIBRS categories, ZIP codes, and geocoded point WKT when available.
    jurisdiction_name: Dallas
    jurisdiction_state: TX
    date_column: null
    year_column: year1
    day_of_year_column: date1dayofyear
    time_column: time1
    offense_column: nibrs_crime_category
    offense_code_column: nibrs_code
    latitude_column: null
    longitude_column: null
    geocoded_point_column: geocoded_column
    address_column: incident_address
    zip_column: zip_code
    incident_id_column: servnumid
    source_crs: EPSG:4326
    timezone: America/Chicago

