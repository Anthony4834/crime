    jurisdiction_name: Boston
    jurisdiction_state: MA
    date_column: OCCURRED_ON_DATE
    time_column: null
    offense_column: OFFENSE_DESCRIPTION
    offense_code_column: OFFENSE_CODE
    latitude_column: Lat
    longitude_column: Long
