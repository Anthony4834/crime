    jurisdiction_name: Philadelphia
    jurisdiction_state: PA
    date_column: dispatch_date_time
    time_column: null
    offense_column: text_general_code
    offense_code_column: ucr_general
    latitude_column: lat
    longitude_column: lng
    address_column: location_block
    zip_column: null
    incident_id_column: objectid
    source_crs: EPSG:4326
    timezone: America/New_York

  denver_2024:
    file: data/raw/crime/denver_crime_2024.csv
    download:
      type: arcgis_query
      endpoint: https://services1.arcgis.com/zdB7qR0BtYrg0Xpl/arcgis/rest/services/ODC_CRIME_OFFENSES_P/FeatureServer/324
      where: FIRST_OCCURRENCE_DATE >= DATE '2024-01-01' AND FIRST_OCCURRENCE_DATE < DATE '2025-01-01'
      out_fields:
        - INCIDENT_ID
        - OFFENSE_ID
        - OFFENSE_TYPE_ID
        - OFFENSE_CATEGORY_ID
        - FIRST_OCCURRENCE_DATE
        - LAST_OCCURRENCE_DATE
        - GEO_LON
        - GEO_LAT
        - NEIGHBORHOOD_ID
      page_size: 2000
      return_geometry: false
      timeout_seconds: 300
    source_type: local_incident
    source_url: https://opendata-geospatialdenver.hub.arcgis.com/datasets/geospatialDenver::crime/about
    source_year: 2024
    coverage_level: jurisdiction
    coverage_area_name: City and County of Denver
    coverage_state: CO
    data_start_date: 2024-01-01
    data_end_date: 2024-12-31
    update_cadence: historical_snapshot
    coordinate_quality: reported_or_geocoded_point
    offense_mapping_quality: configured_keyword_mapping
    coverage_notes: Denver crime offenses from the official ArcGIS open data layer; source notes records can change as investigations are updated.
    jurisdiction_name: Denver
    jurisdiction_state: CO
    date_column: FIRST_OCCURRENCE_DATE
    time_column: null
    offense_column: OFFENSE_CATEGORY_ID
    offense_code_column: OFFENSE_TYPE_ID
    latitude_column: GEO_LAT
    longitude_column: GEO_LON
    address_column: NEIGHBORHOOD_ID
    zip_column: null
    incident_id_column: OFFENSE_ID
    source_crs: EPSG:4326
    timezone: America/Denver

